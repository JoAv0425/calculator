<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calc.js" defer></script>
</head>
<body>
    <div class="frame">
        <div class="container">
            <div class="display">

            </div>
            <div class="buttons">
                <div class="first row" >
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>&divide;</button>
                </div>
                <div class="second row">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>&times;</button>
                </div>
                <div class="third row">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>&minus;</button>
                </div>
                <div class="fourth row">
                    <button>0</button>
                    <button>.</button>
                    <button style="font-size: 20px;">&#9003;</button>
                    <button>+</button>
                </div>
                <div class="fifth row">
                    <button style="font-size: 22px;">AC</button>
                    <button>=</button>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
