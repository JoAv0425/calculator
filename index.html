<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="calc.js" defer></script>
</head>
<body>
    <div class="frame">
        <div class="container">
            <div class="display">

            </div>
            <div class="buttons">
                <div class="first row" >
                    <button value="7">7</button>
                    <button value="8">8</button>
                    <button value="9">9</button>
                    <button value="÷">&divide;</button>
                </div>
                <div class="second row">
                    <button value="4">4</button>
                    <button value="5">5</button>
                    <button value="6">6</button>
                    <button value="×">&times;</button>
                </div>
                <div class="third row">
                    <button value="1">1</button>
                    <button value="2">2</button>
                    <button value="3">3</button>
                    <button value="-">&minus;</button>
                </div>
                <div class="fourth row">
                    <button value="0">0</button>
                    <button value="." class="decimal-point">.</button>
                    <button style="font-size: 18px;" class="back-space">&#9003;</button>
                    <button value="+">+</button>
                </div>
                <div class="fifth row">
                    <button style="font-size: 22px;" value="clear">AC</button>
                    <button value="=" class="equals">=</button>
                    
                </div>
            </div>
        </div>
    </div>
</body>
</html>
